name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifacts: |
              skepa_db_cli:skepa_db_cli-linux-x86_64
              skepa_db_server:skepa_db_server-linux-x86_64
          - os: windows-latest
            artifacts: |
              skepa_db_cli.exe:skepa_db_cli-windows-x86_64.exe
              skepa_db_server.exe:skepa_db_server-windows-x86_64.exe
          - os: macos-latest
            artifacts: |
              skepa_db_cli:skepa_db_cli-macos-aarch64
              skepa_db_server:skepa_db_server-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo and target
        uses: Swatinem/rust-cache@v2

      - name: Build CLI and server (release)
        run: cargo build --release -p skepa_db_cli -p skepa_db_server

      - name: Prepare artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          while IFS=: read -r src dest; do
            cp "target/release/${src}" "${dest}"
            chmod +x "${dest}"
          done <<< "${{ matrix.artifacts }}"

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($line in @"
${{ matrix.artifacts }}
"@ -split "`n") {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $parts = $line.Trim().Split(":")
            Copy-Item "target/release/$($parts[0])" "$($parts[1])"
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            skepa_db_cli-*
            skepa_db_server-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/skepa_db_cli-linux-x86_64
            release-assets/**/skepa_db_cli-windows-x86_64.exe
            release-assets/**/skepa_db_cli-macos-aarch64
            release-assets/**/skepa_db_server-linux-x86_64
            release-assets/**/skepa_db_server-windows-x86_64.exe
            release-assets/**/skepa_db_server-macos-aarch64
